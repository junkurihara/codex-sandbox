name: build

# Build the image and push it to both Docker Hub and GHCR.
on:
  push:
    branches: [main]
    tags: ["v*"]
  # Rebuild daily to pick up new Codex CLI releases and base image patches.
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC (03:00 JST)
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'jqtype/codex-sandbox' }}
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/codex-sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve latest Codex CLI version
        id: codexver
        # Pass a concrete version so the npm-install layer cache is busted only
        # when a new Codex CLI version is actually published.
        run: echo "version=$(npm view @openai/codex version)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=codex-${{ steps.codexver.outputs.version }}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TZ=Asia/Tokyo
            CODEX_VERSION=${{ steps.codexver.outputs.version }}
            USER_UID=1000
            USER_GID=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max
